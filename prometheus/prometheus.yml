global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: "monitoreo-actividad"

scrape_configs:
  - job_name: "mi-api"
    metrics_path: /metrics
    static_configs:
      - targets: ["api:3000"]
        labels:
          servicio: "api-rest"

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
